<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD 파일 뷰어</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3748;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #7c3aed;
    }

    header span {
      font-size: 13px;
      color: #718096;
    }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* 오른쪽 파일 목록 */
    .sidebar {
      width: 260px;
      min-width: 200px;
      background: #1a1d2e;
      border-left: 1px solid #2d3748;
      display: flex;
      flex-direction: column;
      order: 2;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #2d3748;
      font-size: 13px;
      font-weight: 600;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #file-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-size: 14px;
      color: #a0aec0;
      margin-bottom: 2px;
    }

    .file-item:hover { background: #2d3748; color: #e2e8f0; }

    .file-item.active {
      background: #4c1d95;
      color: #e9d5ff;
    }

    .file-item .icon { font-size: 16px; flex-shrink: 0; }

    .file-item .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 왼쪽 뷰어 */
    .viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      order: 1;
    }

    .viewer-toolbar {
      padding: 12px 24px;
      border-bottom: 1px solid #2d3748;
      background: #161822;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #current-file-name {
      font-size: 14px;
      font-weight: 600;
      color: #9f7aea;
    }

    .viewer-toolbar .badge {
      font-size: 11px;
      background: #2d3748;
      color: #a0aec0;
      padding: 2px 8px;
      border-radius: 4px;
    }

    #md-output {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
      line-height: 1.8;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: #4a5568;
      text-align: center;
    }

    .empty-state .emoji { font-size: 48px; }
    .empty-state p { font-size: 15px; }

    /* Markdown 스타일 */
    #md-output h1 {
      font-size: 28px;
      font-weight: 700;
      color: #e9d5ff;
      margin: 0 0 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid #4c1d95;
    }

    #md-output h2 {
      font-size: 20px;
      font-weight: 600;
      color: #c4b5fd;
      margin: 32px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #2d3748;
    }

    #md-output h3 {
      font-size: 16px;
      font-weight: 600;
      color: #a78bfa;
      margin: 20px 0 8px;
    }

    #md-output p { margin: 8px 0; color: #cbd5e0; }

    #md-output a { color: #7c3aed; text-decoration: none; }
    #md-output a:hover { text-decoration: underline; color: #9f7aea; }

    #md-output ul, #md-output ol {
      padding-left: 24px;
      margin: 8px 0;
    }

    #md-output li { color: #cbd5e0; margin: 4px 0; }

    #md-output table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }

    #md-output th {
      background: #2d3748;
      color: #e2e8f0;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
    }

    #md-output td {
      padding: 9px 14px;
      border-top: 1px solid #2d3748;
      color: #cbd5e0;
    }

    #md-output tr:hover td { background: #1e2130; }

    #md-output code {
      background: #2d3748;
      color: #f6e05e;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 13px;
    }

    #md-output pre {
      background: #1a1d2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
    }

    #md-output pre code {
      background: none;
      padding: 0;
      font-size: 13px;
      color: #a8d5e2;
    }

    #md-output blockquote {
      border-left: 4px solid #4c1d95;
      background: #1a1d2e;
      padding: 12px 16px;
      margin: 12px 0;
      border-radius: 0 6px 6px 0;
      color: #a0aec0;
    }

    #md-output hr {
      border: none;
      border-top: 1px solid #2d3748;
      margin: 24px 0;
    }

    #md-output strong { color: #e2e8f0; font-weight: 600; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #718096; }
  </style>
</head>
<body>
  <header>
    <h1>📋 MD 파일 뷰어</h1>
    <span>정보 수집 보고서</span>
  </header>

  <div class="container">
    <!-- 왼쪽: 뷰어 -->
    <div class="viewer">
      <div class="viewer-toolbar">
        <span id="current-file-name">파일을 선택하세요</span>
        <span class="badge" id="file-badge" style="display:none">Markdown</span>
      </div>
      <div id="md-output">
        <div class="empty-state">
          <div class="emoji">📄</div>
          <p>오른쪽 목록에서 파일을 클릭하면<br>내용이 표시됩니다.</p>
        </div>
      </div>
    </div>

    <!-- 오른쪽: 파일 목록 -->
    <div class="sidebar">
      <div class="sidebar-header">📁 보고서 목록</div>
      <div id="file-list"></div>
    </div>
  </div>

  <script>
    // ── Markdown → HTML 변환 ──
    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function parseMarkdown(md) {
      const lines = md.split('\n');
      let html = '';
      let inTable = false;
      let tableRows = [];
      let inCodeBlock = false;
      let codeLang = '';
      let codeLines = [];
      let inList = false;
      let listType = '';
      let listItems = [];

      function flushList() {
        if (!inList) return;
        const tag = listType === 'ul' ? 'ul' : 'ol';
        html += `<${tag}>${listItems.map(i => `<li>${inline(i)}</li>`).join('')}</${tag}>`;
        inList = false;
        listItems = [];
      }

      function flushTable() {
        if (!inTable) return;
        if (tableRows.length === 0) { inTable = false; return; }
        const [head, , ...body] = tableRows; // 두 번째 행(구분선) 제거
        const headers = head.map(c => `<th>${inline(c)}</th>`).join('');
        const bodyRows = body.map(r =>
          `<tr>${r.map(c => `<td>${inline(c)}</td>`).join('')}</tr>`
        ).join('');
        html += `<table><thead><tr>${headers}</tr></thead><tbody>${bodyRows}</tbody></table>`;
        inTable = false;
        tableRows = [];
      }

      function inline(text) {
        return text
          .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
          .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" style="max-width:100%">');
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // 코드 블록
        if (line.startsWith('```')) {
          if (!inCodeBlock) {
            flushList(); flushTable();
            inCodeBlock = true;
            codeLang = line.slice(3).trim();
            codeLines = [];
          } else {
            html += `<pre><code>${escHtml(codeLines.join('\n'))}</code></pre>`;
            inCodeBlock = false;
          }
          continue;
        }
        if (inCodeBlock) { codeLines.push(line); continue; }

        // 테이블 행
        if (line.startsWith('|') && line.endsWith('|')) {
          flushList();
          const cells = line.slice(1, -1).split('|').map(c => c.trim());
          if (!inTable) inTable = true;
          tableRows.push(cells);
          continue;
        } else if (inTable) {
          flushTable();
        }

        // HR
        if (/^---+$/.test(line.trim())) {
          flushList();
          html += '<hr>';
          continue;
        }

        // 제목
        if (line.startsWith('### ')) {
          flushList();
          html += `<h3>${inline(line.slice(4))}</h3>`;
          continue;
        }
        if (line.startsWith('## ')) {
          flushList();
          html += `<h2>${inline(line.slice(3))}</h2>`;
          continue;
        }
        if (line.startsWith('# ')) {
          flushList();
          html += `<h1>${inline(line.slice(2))}</h1>`;
          continue;
        }

        // Blockquote
        if (line.startsWith('> ')) {
          flushList();
          html += `<blockquote>${inline(line.slice(2))}</blockquote>`;
          continue;
        }

        // 순서 없는 목록
        if (/^[\*\-] /.test(line)) {
          if (inList && listType !== 'ul') flushList();
          inList = true; listType = 'ul';
          listItems.push(line.replace(/^[\*\-] /, ''));
          continue;
        }

        // 순서 있는 목록
        if (/^\d+\. /.test(line)) {
          if (inList && listType !== 'ol') flushList();
          inList = true; listType = 'ol';
          listItems.push(line.replace(/^\d+\. /, ''));
          continue;
        }

        // 빈 줄
        if (line.trim() === '') {
          flushList();
          continue;
        }

        // 일반 단락
        flushList();
        html += `<p>${inline(line)}</p>`;
      }

      flushList();
      flushTable();
      return html;
    }

    // ── 파일 목록 생성 (오늘 날짜부터 60일 전까지 후보) ──
    function generateDates() {
      const dates = [];
      const base = new Date('2026-04-15');
      for (let i = 0; i < 60; i++) {
        const d = new Date(base);
        d.setDate(base.getDate() - i);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        dates.push(`${y}-${m}-${day}`);
      }
      return dates;
    }

    async function fileExists(path) {
      try {
        const res = await fetch(path, { method: 'HEAD' });
        return res.ok;
      } catch { return false; }
    }

    async function loadFile(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error('로드 실패');
      return res.text();
    }

    // ── UI ──
    let activeItem = null;

    async function selectFile(filename, item) {
      if (activeItem) activeItem.classList.remove('active');
      item.classList.add('active');
      activeItem = item;

      document.getElementById('current-file-name').textContent = filename;
      document.getElementById('file-badge').style.display = 'inline';

      const output = document.getElementById('md-output');
      output.innerHTML = '<p style="color:#718096;text-align:center;margin-top:48px">로딩 중...</p>';

      try {
        const text = await loadFile(`reports/${filename}`);
        output.innerHTML = parseMarkdown(text);
        output.scrollTop = 0;
      } catch {
        output.innerHTML = '<p style="color:#fc8181;text-align:center;margin-top:48px">파일을 불러오지 못했습니다.</p>';
      }
    }

    async function init() {
      const listEl = document.getElementById('file-list');
      listEl.innerHTML = '<p style="color:#718096;font-size:13px;padding:16px">검색 중...</p>';

      const dates = generateDates();
      const results = await Promise.all(
        dates.map(d => fileExists(`reports/${d}.md`).then(ok => ({ d, ok })))
      );

      const found = results.filter(r => r.ok);
      listEl.innerHTML = '';

      if (found.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state" style="height:auto;padding:32px 16px;font-size:13px;">
            <div class="emoji" style="font-size:32px">🗂️</div>
            <p>reports/ 폴더에<br>MD 파일이 없습니다.</p>
          </div>`;
        return;
      }

      for (const { d } of found) {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `<span class="icon">📄</span><span class="name">${d}.md</span>`;
        item.addEventListener('click', () => selectFile(`${d}.md`, item));
        listEl.appendChild(item);
      }

      // 첫 번째 파일 자동 선택
      listEl.querySelector('.file-item').click();
    }

    init();
  </script>
</body>
</html>
