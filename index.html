<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD 파일 뷰어</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3748;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 { font-size: 17px; font-weight: 600; color: #7c3aed; }
    header .subtitle { font-size: 13px; color: #718096; flex: 1; }

    /* 수집 버튼 */
    #collect-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: #4c1d95;
      color: #e9d5ff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #collect-btn:hover { background: #5b21b6; }
    #collect-btn:active { background: #3b0764; }
    #collect-btn .spin { display: none; animation: spin 1s linear infinite; }
    #collect-btn.loading .spin { display: inline; }
    #collect-btn.loading .icon { display: none; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* 알림 토스트 */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2d3748;
      color: #e2e8f0;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      transition: transform 0.3s ease;
      z-index: 100;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* 오른쪽 파일 목록 */
    .sidebar {
      width: 260px;
      min-width: 200px;
      background: #1a1d2e;
      border-left: 1px solid #2d3748;
      display: flex;
      flex-direction: column;
      order: 2;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid #2d3748;
      font-size: 12px;
      font-weight: 600;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #refresh-list-btn {
      background: none;
      border: none;
      color: #718096;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    #refresh-list-btn:hover { color: #a0aec0; }

    #file-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .date-group { margin-bottom: 8px; }

    .date-label {
      font-size: 11px;
      font-weight: 600;
      color: #4a5568;
      padding: 6px 12px 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-size: 13px;
      color: #a0aec0;
      margin-bottom: 2px;
    }

    .file-item:hover { background: #2d3748; color: #e2e8f0; }
    .file-item.active { background: #4c1d95; color: #e9d5ff; }

    .file-item .run-badge {
      background: #2d3748;
      color: #718096;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .file-item.active .run-badge { background: #5b21b6; color: #c4b5fd; }

    .file-item .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 왼쪽 뷰어 */
    .viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      order: 1;
    }

    .viewer-toolbar {
      padding: 10px 24px;
      border-bottom: 1px solid #2d3748;
      background: #161822;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #current-file-name { font-size: 13px; font-weight: 600; color: #9f7aea; }

    .badge {
      font-size: 11px;
      background: #2d3748;
      color: #a0aec0;
      padding: 2px 8px;
      border-radius: 4px;
    }

    #md-output {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
      line-height: 1.8;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: #4a5568;
      text-align: center;
    }
    .empty-state .emoji { font-size: 40px; }
    .empty-state p { font-size: 14px; }

    /* Markdown 렌더링 */
    #md-output h1 {
      font-size: 26px; font-weight: 700; color: #e9d5ff;
      margin: 0 0 20px; padding-bottom: 10px;
      border-bottom: 2px solid #4c1d95;
    }
    #md-output h2 {
      font-size: 19px; font-weight: 600; color: #c4b5fd;
      margin: 28px 0 10px; padding-bottom: 5px;
      border-bottom: 1px solid #2d3748;
    }
    #md-output h3 { font-size: 15px; font-weight: 600; color: #a78bfa; margin: 18px 0 6px; }
    #md-output p { margin: 6px 0; color: #cbd5e0; }
    #md-output a { color: #7c3aed; text-decoration: none; }
    #md-output a:hover { text-decoration: underline; color: #9f7aea; }
    #md-output ul, #md-output ol { padding-left: 22px; margin: 6px 0; }
    #md-output li { color: #cbd5e0; margin: 3px 0; }
    #md-output table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; }
    #md-output th { background: #2d3748; color: #e2e8f0; padding: 9px 13px; text-align: left; font-weight: 600; }
    #md-output td { padding: 8px 13px; border-top: 1px solid #2d3748; color: #cbd5e0; }
    #md-output tr:hover td { background: #1e2130; }
    #md-output code {
      background: #2d3748; color: #f6e05e;
      padding: 2px 6px; border-radius: 4px;
      font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px;
    }
    #md-output pre {
      background: #1a1d2e; border: 1px solid #2d3748;
      border-radius: 8px; padding: 14px; overflow-x: auto; margin: 10px 0;
    }
    #md-output pre code { background: none; padding: 0; font-size: 12px; color: #a8d5e2; }
    #md-output blockquote {
      border-left: 4px solid #4c1d95; background: #1a1d2e;
      padding: 10px 14px; margin: 10px 0; border-radius: 0 6px 6px 0; color: #a0aec0;
    }
    #md-output hr { border: none; border-top: 1px solid #2d3748; margin: 20px 0; }
    #md-output strong { color: #e2e8f0; font-weight: 600; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>📋 MD 파일 뷰어</h1>
  <span class="subtitle">정보 수집 보고서</span>
  <button id="collect-btn" title="수집 실행 안내">
    <span class="icon">▶</span>
    <span class="spin">↻</span>
    수집 실행
  </button>
</header>

<div id="toast"></div>

<div class="container">
  <!-- 왼쪽: 뷰어 -->
  <div class="viewer">
    <div class="viewer-toolbar">
      <span id="current-file-name">파일을 선택하세요</span>
      <span class="badge" id="file-badge" style="display:none">Markdown</span>
    </div>
    <div id="md-output">
      <div class="empty-state">
        <div class="emoji">📄</div>
        <p>오른쪽 목록에서 파일을 클릭하면<br>내용이 표시됩니다.</p>
      </div>
    </div>
  </div>

  <!-- 오른쪽: 파일 목록 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>📁 보고서 목록</span>
      <button id="refresh-list-btn" title="목록 새로고침">↻</button>
    </div>
    <div id="file-list"></div>
  </div>
</div>

<script>
  // ── Markdown → HTML 변환 ──
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function inline(text) {
    return text
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" style="max-width:100%">')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  }

  function parseMarkdown(md) {
    const lines = md.split('\n');
    let html = '';
    let inCode = false, codeLang = '', codeLines = [];
    let inTable = false, tableRows = [];
    let inList = false, listType = '', listItems = [];

    function flushList() {
      if (!inList) return;
      const tag = listType === 'ul' ? 'ul' : 'ol';
      html += `<${tag}>${listItems.map(i => `<li>${inline(i)}</li>`).join('')}</${tag}>`;
      inList = false; listItems = [];
    }
    function flushTable() {
      if (!inTable) return;
      if (tableRows.length === 0) { inTable = false; return; }
      const [head, , ...body] = tableRows;
      const th = head.map(c => `<th>${inline(c)}</th>`).join('');
      const tb = body.map(r => `<tr>${r.map(c => `<td>${inline(c)}</td>`).join('')}</tr>`).join('');
      html += `<table><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table>`;
      inTable = false; tableRows = [];
    }

    for (const line of lines) {
      if (line.startsWith('```')) {
        if (!inCode) {
          flushList(); flushTable();
          inCode = true; codeLang = line.slice(3).trim(); codeLines = [];
        } else {
          html += `<pre><code>${escHtml(codeLines.join('\n'))}</code></pre>`;
          inCode = false;
        }
        continue;
      }
      if (inCode) { codeLines.push(line); continue; }

      if (line.startsWith('|') && line.endsWith('|')) {
        flushList();
        tableRows.push(line.slice(1,-1).split('|').map(c => c.trim()));
        inTable = true;
        continue;
      } else if (inTable) { flushTable(); }

      if (/^---+$/.test(line.trim())) { flushList(); html += '<hr>'; continue; }
      if (line.startsWith('### ')) { flushList(); html += `<h3>${inline(line.slice(4))}</h3>`; continue; }
      if (line.startsWith('## '))  { flushList(); html += `<h2>${inline(line.slice(3))}</h2>`; continue; }
      if (line.startsWith('# '))   { flushList(); html += `<h1>${inline(line.slice(2))}</h1>`; continue; }
      if (line.startsWith('> '))   { flushList(); html += `<blockquote>${inline(line.slice(2))}</blockquote>`; continue; }

      if (/^[\*\-] /.test(line)) {
        if (inList && listType !== 'ul') flushList();
        inList = true; listType = 'ul';
        listItems.push(line.replace(/^[\*\-] /, ''));
        continue;
      }
      if (/^\d+\. /.test(line)) {
        if (inList && listType !== 'ol') flushList();
        inList = true; listType = 'ol';
        listItems.push(line.replace(/^\d+\. /, ''));
        continue;
      }
      if (line.trim() === '') { flushList(); continue; }

      flushList();
      html += `<p>${inline(line)}</p>`;
    }
    flushList(); flushTable();
    return html;
  }

  // ── 파일 감지: {date}_{NN}.md 형식 ──
  function generateCandidates() {
    const files = [];
    const base = new Date('2026-04-15');
    for (let i = 0; i < 60; i++) {
      const d = new Date(base);
      d.setDate(base.getDate() - i);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      const date = `${y}-${m}-${day}`;
      // 각 날짜별로 01~09번까지 후보
      for (let n = 1; n <= 9; n++) {
        files.push({ date, run: String(n).padStart(2,'0'), name: `${date}_${String(n).padStart(2,'0')}.md` });
      }
    }
    return files;
  }

  async function fileExists(path) {
    try { return (await fetch(path, { method: 'HEAD' })).ok; }
    catch { return false; }
  }

  async function loadFile(path) {
    const res = await fetch(path);
    if (!res.ok) throw new Error();
    return res.text();
  }

  // ── UI ──
  let activeItem = null;

  async function selectFile(filename, item) {
    if (activeItem) activeItem.classList.remove('active');
    item.classList.add('active');
    activeItem = item;

    document.getElementById('current-file-name').textContent = filename;
    document.getElementById('file-badge').style.display = 'inline';

    const output = document.getElementById('md-output');
    output.innerHTML = '<p style="color:#718096;text-align:center;margin-top:48px">로딩 중...</p>';
    try {
      const text = await loadFile(`reports/${filename}`);
      output.innerHTML = parseMarkdown(text);
      output.scrollTop = 0;
    } catch {
      output.innerHTML = '<p style="color:#fc8181;text-align:center;margin-top:48px">파일을 불러오지 못했습니다.</p>';
    }
  }

  function showToast(msg, ms = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  async function buildFileList() {
    const listEl = document.getElementById('file-list');
    listEl.innerHTML = '<p style="color:#718096;font-size:12px;padding:16px">검색 중...</p>';

    const candidates = generateCandidates();
    const checks = await Promise.all(
      candidates.map(c => fileExists(`reports/${c.name}`).then(ok => ({ ...c, ok })))
    );

    const found = checks.filter(c => c.ok);
    listEl.innerHTML = '';

    if (found.length === 0) {
      listEl.innerHTML = `
        <div class="empty-state" style="height:auto;padding:32px 12px;font-size:12px;">
          <div class="emoji" style="font-size:28px">🗂️</div>
          <p>보고서 파일이<br>없습니다.</p>
        </div>`;
      return;
    }

    // 날짜별로 그룹핑
    const byDate = {};
    for (const f of found) {
      if (!byDate[f.date]) byDate[f.date] = [];
      byDate[f.date].push(f);
    }

    let firstItem = null;
    for (const [date, files] of Object.entries(byDate)) {
      const group = document.createElement('div');
      group.className = 'date-group';
      group.innerHTML = `<div class="date-label">📅 ${date}</div>`;

      for (const f of files) {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
          <span class="name">${f.name}</span>
          <span class="run-badge">#${f.run}</span>`;
        item.addEventListener('click', () => selectFile(f.name, item));
        group.appendChild(item);
        if (!firstItem) firstItem = item;
      }
      listEl.appendChild(group);
    }

    if (firstItem) firstItem.click();
  }

  // 수집 버튼 — 수집 방법 안내 토스트 표시
  document.getElementById('collect-btn').addEventListener('click', () => {
    showToast('Claude Code를 실행하면 새 보고서가 자동 수집됩니다.', 4000);
  });

  // 목록 새로고침 버튼
  document.getElementById('refresh-list-btn').addEventListener('click', () => {
    buildFileList();
    showToast('파일 목록을 새로고침했습니다.');
  });

  buildFileList();
</script>
</body>
</html>
