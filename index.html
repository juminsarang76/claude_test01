<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD 파일 뷰어</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>📋 MD 파일 뷰어</h1>
  <span class="subtitle">정보 수집 보고서</span>
</header>

<div id="toast"></div>

<div class="container">
  <!-- 왼쪽: 뷰어 -->
  <div class="viewer">
    <div class="viewer-toolbar">
      <button id="collect-btn">
        <span class="icon">▶</span>
        <span class="spin">↻</span>
        수집 실행
      </button>
      <button id="update-btn" disabled>
        <span class="icon">🔄</span>
        <span class="spin">↻</span>
        업데이트
      </button>
      <span id="current-file-name">파일을 선택하세요</span>
      <span class="badge" id="file-badge" style="display:none">Markdown</span>
    </div>

    <!-- 진행률 바 -->
    <div id="progress-wrap">
      <div id="progress-bar-track">
        <div id="progress-bar-fill"></div>
      </div>
      <div id="progress-info">
        <span id="progress-pct">0%</span>
        <span id="progress-step"></span>
      </div>
    </div>

    <div id="md-output">
      <div class="empty-state">
        <div class="emoji">📄</div>
        <p>오른쪽 목록에서 파일을 클릭하면<br>내용이 표시됩니다.</p>
      </div>
    </div>
  </div>

  <!-- 오른쪽: 파일 목록 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>📁 보고서 목록</span>
      <button id="refresh-list-btn" title="목록 새로고침">↻</button>
    </div>
    <div id="file-list"></div>
  </div>
</div>

<script>
  // ── Markdown → HTML 변환 ──
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function inline(text) {
    return text
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
      .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" style="max-width:100%">')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  }

  function parseMarkdown(md) {
    const lines = md.split('\n');
    let html = '';
    let inCode = false, codeLang = '', codeLines = [];
    let inTable = false, tableRows = [];
    let inList = false, listType = '', listItems = [];

    function flushList() {
      if (!inList) return;
      const tag = listType === 'ul' ? 'ul' : 'ol';
      html += `<${tag}>${listItems.map(i => `<li>${inline(i)}</li>`).join('')}</${tag}>`;
      inList = false; listItems = [];
    }
    function flushTable() {
      if (!inTable) return;
      if (tableRows.length === 0) { inTable = false; return; }
      const [head, , ...body] = tableRows;
      const th = head.map(c => `<th>${inline(c)}</th>`).join('');
      const tb = body.map(r => `<tr>${r.map(c => `<td>${inline(c)}</td>`).join('')}</tr>`).join('');
      html += `<table><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table>`;
      inTable = false; tableRows = [];
    }

    for (const line of lines) {
      if (line.startsWith('```')) {
        if (!inCode) {
          flushList(); flushTable();
          inCode = true; codeLang = line.slice(3).trim(); codeLines = [];
        } else {
          html += `<pre><code>${escHtml(codeLines.join('\n'))}</code></pre>`;
          inCode = false;
        }
        continue;
      }
      if (inCode) { codeLines.push(line); continue; }

      if (line.startsWith('|') && line.endsWith('|')) {
        flushList();
        tableRows.push(line.slice(1,-1).split('|').map(c => c.trim()));
        inTable = true;
        continue;
      } else if (inTable) { flushTable(); }

      if (/^---+$/.test(line.trim())) { flushList(); html += '<hr>'; continue; }
      if (line.startsWith('### ')) { flushList(); html += `<h3>${inline(line.slice(4))}</h3>`; continue; }
      if (line.startsWith('## '))  { flushList(); html += `<h2>${inline(line.slice(3))}</h2>`; continue; }
      if (line.startsWith('# '))   { flushList(); html += `<h1>${inline(line.slice(2))}</h1>`; continue; }
      if (line.startsWith('> '))   { flushList(); html += `<blockquote>${inline(line.slice(2))}</blockquote>`; continue; }

      if (/^[\*\-] /.test(line)) {
        if (inList && listType !== 'ul') flushList();
        inList = true; listType = 'ul';
        listItems.push(line.replace(/^[\*\-] /, ''));
        continue;
      }
      if (/^\d+\. /.test(line)) {
        if (inList && listType !== 'ol') flushList();
        inList = true; listType = 'ol';
        listItems.push(line.replace(/^\d+\. /, ''));
        continue;
      }
      if (line.trim() === '') { flushList(); continue; }

      flushList();
      html += `<p>${inline(line)}</p>`;
    }
    flushList(); flushTable();
    return html;
  }

  // ── 파일 목록: /api/list(로컬) → reports/index.json(GitHub Pages) 폴백 ──
  async function fetchFileList() {
    let names;
    try {
      const res = await fetch('/api/list');
      if (res.ok) { names = await res.json(); }
    } catch {}

    if (!names) {
      const res = await fetch('reports/index.json');
      if (!res.ok) throw new Error('목록 조회 실패');
      names = await res.json();
    }

    return names.map(name => ({
      name,
      date: name.slice(0, 10),
      run:  name.slice(11, 13),
    }));
  }

  async function loadFile(path) {
    const res = await fetch(path);
    if (!res.ok) throw new Error();
    return res.text();
  }

  // ── UI ──
  let activeItem   = null;
  let currentFilename = null;

  async function selectFile(filename, item) {
    if (activeItem) activeItem.classList.remove('active');
    item.classList.add('active');
    activeItem = item;
    currentFilename = filename;

    document.getElementById('current-file-name').textContent = filename;
    document.getElementById('file-badge').style.display = 'inline';
    document.getElementById('update-btn').disabled = false;

    const output = document.getElementById('md-output');
    output.innerHTML = '<p style="color:#718096;text-align:center;margin-top:48px">로딩 중...</p>';
    try {
      const text = await loadFile(`reports/${filename}`);
      output.innerHTML = parseMarkdown(text);
      output.scrollTop = 0;
    } catch {
      output.innerHTML = '<p style="color:#fc8181;text-align:center;margin-top:48px">파일을 불러오지 못했습니다.</p>';
    }
  }

  function showToast(msg, ms = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  async function buildFileList(autoSelectFilename = null) {
    const listEl = document.getElementById('file-list');
    listEl.innerHTML = '<p style="color:#718096;font-size:12px;padding:16px">검색 중...</p>';

    let found;
    try {
      found = await fetchFileList();
    } catch {
      listEl.innerHTML = '<p style="color:#fc8181;font-size:12px;padding:16px">목록 조회 실패</p>';
      return;
    }
    listEl.innerHTML = '';

    if (found.length === 0) {
      listEl.innerHTML = `
        <div class="empty-state" style="height:auto;padding:32px 12px;font-size:12px;">
          <div class="emoji" style="font-size:28px">🗂️</div>
          <p>보고서 파일이<br>없습니다.</p>
        </div>`;
      return;
    }

    // 날짜별로 그룹핑
    const byDate = {};
    for (const f of found) {
      if (!byDate[f.date]) byDate[f.date] = [];
      byDate[f.date].push(f);
    }

    let firstItem = null;
    for (const [date, files] of Object.entries(byDate)) {
      const group = document.createElement('div');
      group.className = 'date-group';
      group.innerHTML = `<div class="date-label">📅 ${date}</div>`;

      for (const f of files) {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
          <span class="name">${f.name}</span>
          <span class="run-badge">#${f.run}</span>`;
        item.addEventListener('click', () => selectFile(f.name, item));
        group.appendChild(item);
        if (!firstItem) firstItem = item;
        if (autoSelectFilename && f.name === autoSelectFilename) firstItem = item;
      }
      listEl.appendChild(group);
    }

    if (firstItem) firstItem.click();
  }

  // ── 진행률 바 ──
  function setProgress(pct, step) {
    document.getElementById('progress-bar-fill').style.width = pct + '%';
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-step').textContent = step;
  }
  function showProgress() { document.getElementById('progress-wrap').classList.add('active'); }
  function hideProgress() { document.getElementById('progress-wrap').classList.remove('active'); }

  // ── SSE 공통 수집 함수 ──
  async function runCollectSSE({ url, body, btn, onDone }) {
    btn.disabled = true;
    btn.classList.add('loading');
    document.getElementById('collect-btn').disabled = true;
    document.getElementById('update-btn').disabled  = true;
    showProgress();
    setProgress(0, '시작 중...');

    try {
      const response = await fetch(url, {
        method: 'POST',
        ...(body ? { headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) } : {}),
      });
      if (!response.ok) throw new Error('서버 오류: ' + response.status);

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = JSON.parse(line.slice(6));

          if (data.error) {
            showToast('❌ 실패: ' + data.step, 4000);
            setTimeout(hideProgress, 2000);
            break;
          }

          setProgress(data.progress, data.step);

          if (data.done) {
            showToast(`✅ ${data.filename} 완료`);
            setTimeout(async () => { hideProgress(); await onDone(data.filename); }, 800);
          }
        }
      }
    } catch (e) {
      showToast('❌ 서버 연결 실패. node server.js를 실행해주세요.', 5000);
      setProgress(0, '연결 오류');
      setTimeout(hideProgress, 2000);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
      document.getElementById('collect-btn').disabled = false;
      if (currentFilename) document.getElementById('update-btn').disabled = false;
    }
  }

  // ── 수집 버튼 (새 파일 생성) ──
  document.getElementById('collect-btn').addEventListener('click', () => {
    runCollectSSE({
      url: '/api/collect',
      btn: document.getElementById('collect-btn'),
      onDone: async (filename) => { await buildFileList(filename); },
    });
  });

  // ── 업데이트 버튼 (현재 파일 덮어쓰기) ──
  document.getElementById('update-btn').addEventListener('click', () => {
    if (!currentFilename) { showToast('파일을 먼저 선택하세요.', 2000); return; }
    runCollectSSE({
      url:  '/api/update',
      body: { filename: currentFilename },
      btn:  document.getElementById('update-btn'),
      onDone: async (filename) => {
        // 현재 파일 뷰어 새로고침
        const output = document.getElementById('md-output');
        const text   = await loadFile(`reports/${filename}`);
        output.innerHTML = parseMarkdown(text);
        output.scrollTop = 0;
      },
    });
  });

  // 목록 새로고침 버튼
  document.getElementById('refresh-list-btn').addEventListener('click', () => {
    buildFileList();
    showToast('파일 목록을 새로고침했습니다.');
  });

  buildFileList();
</script>
</body>
</html>
